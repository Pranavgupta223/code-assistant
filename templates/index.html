<!DOCTYPE html>
<html>
<head>
    <title>AI Code Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
        }

        #chat {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
        }

        #messages {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 300px;

            overflow-y: auto;
            padding: 10px;
            border-radius: 12px;
            background: #111827;
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 75%;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user {
            background: #2563eb;
            align-self: flex-end;
        }

        .bot {
            background: #1e293b;
            align-self: flex-start;
        }

        .error {
            background: #7f1d1d;
            align-self: flex-start;
        }

        #inputBox {
            display: flex;
            margin-top: 20px;
        }

        #query {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px 0 0 10px;
            font-size: 16px;
        }

        button {
            padding: 14px 20px;
            border: none;
            background: #2563eb;
            color: white;
            cursor: pointer;
            border-radius: 0 10px 10px 0;
            font-size: 16px;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

<div id="chat">
    <h2>💀 AI Code Assistant</h2>

    <div id="messages"></div>

    <div id="inputBox">
        <input id="query" type="text" placeholder="Ask something..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("query");
    const query = input.value.trim();

    if (!query) return;

    addMessage(query, "user");
    input.value = "";

    try {
        const response = await fetch("/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ query: query })
        });

        if (!response.ok) {
            throw new Error(`Server error: ${response.status}`);
        }

        const text = await response.text();
        console.log("Raw response:", text);

        let data;

        try {
            data = JSON.parse(text);
        } catch (e) {
            throw new Error("Backend did not return valid JSON: " + text);
        }

        addMessage(data?.answer || JSON.stringify(data), "bot");

    } catch (error) {
        addMessage("Error: " + error.message, "error");
        console.error(error);
    }
}

function addMessage(text, type) {
    const messages = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = `message ${type}`;
    div.innerText = text;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

// Press Enter to send
const input = document.getElementById("query");
input.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
